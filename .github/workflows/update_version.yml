name: Update Version

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.release }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Update version in code
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/__version__ = \"[^\"]*\"/__version__ = \"$VERSION\"/" main/main.py
          cat main/main.py | grep "__version__"

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add main/main.py
          git commit -m "更新版本号 v${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push
