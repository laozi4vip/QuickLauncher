name: Sync Version From Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"   # e.g. v2.0.1
          VERSION="${TAG#v}"                           # remove leading v
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update version in file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/__version__ = \"[^\"]*\"/__version__ = \"$VERSION\"/" main/main.py
          grep "__version__" main/main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"

          git add main/main.py
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin "${{ github.event.repository.default_branch }}"
