name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install nuitka pywin32 psutil wxpython
    
    - name: Build EXE
      run: |
        python -m nuitka --standalone --onefile --windows-disable-console --output-dir=out main/main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuickLauncher
        path: out/main.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: out/main.exe
        draft: false
        prerelease: false
