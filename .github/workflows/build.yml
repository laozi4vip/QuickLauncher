name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller pywin32 psutil wxpython
    
    - name: Build EXE
      run: |
        echo "Starting build..."
        pyinstaller --version
        pyinstaller --onefile --windowed --name QuickLauncher main/main.py
        echo "Checking output..."
        if (Test-Path "dist\QuickLauncher.exe") {
            Write-Host "SUCCESS: Build output found"
            Get-ChildItem "dist"
            Copy-Item "dist\QuickLauncher.exe" .
        } else {
            Write-Host "ERROR: Build output not found"
            Get-ChildItem
            exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuickLauncher
        path: QuickLauncher.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: QuickLauncher.exe
        token: ${{ secrets.GITHUB_TOKEN }}
