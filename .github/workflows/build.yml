name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Build EXE
      run: |
        pip install nuitka
        python -m nuitka --standalone --onefile --windows-disable-console --include-data-dir=main=main --output-dir=dist main/main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuickLauncher
        path: dist/main.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: dist/main.exe
        token: ${{ secrets.GITHUB_TOKEN }}
