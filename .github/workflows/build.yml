name: Build and Release (Low FP)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      APP_NAME: QuickLauncher
      PYTHON_VERSION: "3.11"
      PYINSTALLER_VERSION: "6.10.0"
      PYWIN32_VERSION: "306"
      PSUTIL_VERSION: "6.0.0"
      WXPYTHON_VERSION: "4.2.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Resolve app version from tag
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.ref }}".StartsWith("refs/tags/")) {
            $v = "${{ github.ref_name }}"
          } else {
            $v = "0.0.0-dev"
          }
          $v = $v.TrimStart("v")
          "app_version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "APP_VERSION=$v"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies (pinned)
        shell: pwsh
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install `
            pyinstaller==${{ env.PYINSTALLER_VERSION }} `
            pywin32==${{ env.PYWIN32_VERSION }} `
            psutil==${{ env.PSUTIL_VERSION }} `
            wxpython==${{ env.WXPYTHON_VERSION }}

      # 低误报建议：onedir + noupx（比 onefile 更稳）
      - name: Build app (PyInstaller onedir, low-FP)
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --windowed --onedir --noupx `
            --collect-all wx `
            --collect-all psutil `
            --icon "main/icon.ico" `
            --name "${{ env.APP_NAME }}" `
            main/main.py

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ env.APP_NAME }}/*" `
                           -DestinationPath "dist/${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.app_version }}-win64.zip" `
                           -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Generate Inno Setup script
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer | Out-Null
          @"
          #define MyAppName "${{ env.APP_NAME }}"
          #define MyAppVersion "${{ steps.ver.outputs.app_version }}"
          #define MyAppPublisher "YourNameOrOrg"
          #define MyAppExeName "${{ env.APP_NAME }}.exe"

          [Setup]
          AppId={{A7E8D2D9-6A96-4F4D-9D96-6D00A9A9A001}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          DisableProgramGroupPage=yes
          OutputDir=dist
          OutputBaseFilename={#MyAppName}-Setup-{#MyAppVersion}-win64
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          UninstallDisplayIcon={app}\{#MyAppExeName}
          SetupIconFile=main\icon.ico

          [Languages]
          Name: "chinesesimp"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"

          [Files]
          Source: "dist\${{ env.APP_NAME }}\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "启动 {#MyAppName}"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path "installer/setup.iss" -Encoding UTF8

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer/setup.iss"

      # 可选签名：配置 Secrets 后自动生效
      # Secrets:
      #   WIN_CERT_PFX_BASE64  (base64后的pfx)
      #   WIN_CERT_PASSWORD
      - name: Optional code signing
        if: ${{ secrets.WIN_CERT_PFX_BASE64 != '' && secrets.WIN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.WIN_CERT_PFX_BASE64 }}"))

          $files = @(
            "dist/${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.app_version }}-win64.zip",
            "dist/${{ env.APP_NAME }}-Setup-${{ steps.ver.outputs.app_version }}-win64.exe"
          )

          foreach ($f in $files) {
            if (Test-Path $f) {
              & signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
                /f $pfxPath /p "${{ secrets.WIN_CERT_PASSWORD }}" "$f"
            }
          }

      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $out = "dist/SHA256SUMS.txt"
          if (Test-Path $out) { Remove-Item $out -Force }

          $targets = @(
            "dist/${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.app_version }}-win64.zip",
            "dist/${{ env.APP_NAME }}-Setup-${{ steps.ver.outputs.app_version }}-win64.exe"
          )

          foreach ($f in $targets) {
            if (Test-Path $f) {
              $h = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
              "$h  $([System.IO.Path]::GetFileName($f))" | Out-File -FilePath $out -Append -Encoding ascii
            }
          }

          Get-Content $out

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-release-files
          path: |
            dist/${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.app_version }}-win64.zip
            dist/${{ env.APP_NAME }}-Setup-${{ steps.ver.outputs.app_version }}-win64.exe
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/${{ env.APP_NAME }}-portable-${{ steps.ver.outputs.app_version }}-win64.zip
            dist/${{ env.APP_NAME }}-Setup-${{ steps.ver.outputs.app_version }}-win64.exe
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
